version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - APP_URL_SHORTENER_BASE_URL=http://localhost:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/dashboard/stats"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontent
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api
