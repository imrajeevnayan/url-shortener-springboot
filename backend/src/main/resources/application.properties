# Application Name
spring.application.name=url-shortener

# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:urlshortenerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URL Shortener Configuration
app.url-shortener.base-url=http://localhost:8080
app.url-shortener.default-expiry-days=30
app.url-shortener.max-custom-alias-length=50

# Logging
logging.level.com.urlshortener=DEBUG
logging.level.org.springframework.web=INFO
